name: webintel

services:
  api:
    image: webintel-api:latest
    build:
      context: .
    environment:
      WEBINTEL_ENVIRONMENT: development
      WEBINTEL_LOG_LEVEL: ${WEBINTEL_LOG_LEVEL:-INFO}
      WEBINTEL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-webintel}:${POSTGRES_PASSWORD:-webintel}@postgres:5432/${POSTGRES_DB:-webintel}
      WEBINTEL_REDIS_URL: redis://redis:6379/0
      WEBINTEL_CRAWLER_USER_AGENT: ${WEBINTEL_CRAWLER_USER_AGENT:-WebIntelBot/0.1 (respectful website intelligence crawler)}
      WEBINTEL_FETCH_TIMEOUT_SECONDS: ${WEBINTEL_FETCH_TIMEOUT_SECONDS:-10}
      WEBINTEL_FETCH_RETRIES: ${WEBINTEL_FETCH_RETRIES:-2}
      WEBINTEL_FETCH_MAX_REDIRECTS: ${WEBINTEL_FETCH_MAX_REDIRECTS:-5}
      WEBINTEL_FETCH_MAX_RESPONSE_BYTES: ${WEBINTEL_FETCH_MAX_RESPONSE_BYTES:-5000000}
    ports:
      - "${WEBINTEL_API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  migrate:
    image: webintel-api:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      WEBINTEL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-webintel}:${POSTGRES_PASSWORD:-webintel}@postgres:5432/${POSTGRES_DB:-webintel}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webintel}
      POSTGRES_USER: ${POSTGRES_USER:-webintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webintel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
